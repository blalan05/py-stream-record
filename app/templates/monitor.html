{% extends "base.html" %}
{% block title %}Monitor{% endblock %}
{% block head %}
<style>
  body { margin: 0; background: #000; overflow: hidden; }
  .nav { display: none !important; }
  .container {
    display: block !important;
    width: 100vw;
    height: 100vh;
    max-width: none;
    padding: 0;
    margin: 0;
  }
  #monitor-video {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    background: #000;
  }
  .monitor-overlay {
    position: fixed;
    top: 8px;
    right: 8px;
    color: #fff8;
    font-size: 12px;
    z-index: 1;
  }
</style>
{% endblock %}
{% block content %}
<video id="monitor-video" autoplay playsinline muted></video>
<div class="monitor-overlay">Theater monitor — double-click for fullscreen</div>
{% endblock %}
{% block scripts %}
<script>
  window.THEATER_WHEP_URL = "{{ whep_url }}";
  window.THEATER_VIDEO_ID = "monitor-video";
</script>
<script src="/static/webrtc.js"></script>
<script>
  document.getElementById("monitor-video").addEventListener("dblclick", () => {
    document.documentElement.requestFullscreen?.();
  });
</script>
{% endblock %}
