<h3>Camera</h3>
{% if capture_source == 'usb' %}
<p class="muted">USB camera — controls apply live (no stream restart)</p>
<div id="v4l2-controls" class="v4l2-panel stack"></div>
<p id="v4l2-status" class="muted"></p>
<button type="button" id="btn-v4l2-refresh" class="btn small">Refresh controls</button>
{% else %}
<form id="camera-form" class="stack">
  <label><input type="checkbox" id="exposure-lock" {% if camera.exposure_lock %}checked{% endif %}> Exposure lock</label>
  <label><input type="checkbox" id="awb-lock" {% if camera.awb_lock %}checked{% endif %}> White balance lock</label>
  <label>Shutter (µs)</label>
  <input type="number" id="shutter" value="{{ camera.shutter_us or 0 }}" min="0">
  <label>Gain</label>
  <input type="number" id="gain" value="{{ camera.gain or 0 }}" min="0">
  <label>Lens position (manual focus)</label>
  <input type="range" id="lens" min="0" max="10" step="0.1" value="{{ camera.lens_position or 0 }}">
  <button type="button" id="btn-camera-save" class="btn">Apply camera</button>
</form>
{% endif %}
