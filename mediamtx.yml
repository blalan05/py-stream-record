###############################################
# Theater app - MediaMTX config
# Camera+audio is published by app/capture.py via RTSP.

logLevel: info
logDestinations: [stdout]

# Outgoing packet queue (global setting in MediaMTX 1.11.x — not per-path)
writeQueueSize: 1024

api: yes
apiAddress: 127.0.0.1:9997

rtsp: yes
rtspAddress: :8554

webrtc: yes
webrtcAddress: :8889
webrtcAllowOrigin: '*'
webrtcAdditionalHosts: []

paths:
  cam:
    source: publisher
    overridePublisher: yes

  cam_preview:
    source: redirect
    sourceRedirect: /cam
