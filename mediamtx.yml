###############################################
# Theater app - MediaMTX config (validated for v1.19.2)
# Camera+audio is published by app/capture.py via RTSP.

logLevel: info
logDestinations: [stdout]

writeQueueSize: 1024

api: yes
apiAddress: 127.0.0.1:9997

rtsp: yes
rtspAddress: :8554

webrtc: yes
webrtcAddress: :8889
webrtcAllowOrigins: ['*']
webrtcIPsFromInterfaces: yes
webrtcAdditionalHosts: []

paths:
  cam:
    source: publisher
    overridePublisher: true
